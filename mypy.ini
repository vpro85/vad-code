[mypy]
# --- Базовый режим строгости ---
# Включает большинство строгих проверок (disallow_untyped_defs, no_implicit_optional и т.д.)
strict = True

# --- Дополнительные запреты ---
# Запрещает вызов функций без аннотаций типов
disallow_untyped_calls = True

# Запрещает использование generic-типов без указания конкретных параметров
# (Например, для list выдаст ошибку и потребует list[str])
disallow_any_generics = True

# Предупреждает, если функция возвращает Any, хотя заявлен другой тип
warn_return_any = True

# Запрещает использовать 'Any' в качестве типа (насколько это возможно)
# Примечание: полностью убрать Any невозможно, но этот флаг заставляет быть внимательнее
disallow_untyped_defs = True

# --- Очистка кода и гигиена ---
# Предупреждает об использовании # type: ignore, которые больше не нужны
warn_unused_ignores = True

# Предупреждает о бессмысленных приведениях типов (cast), которые ничего не меняют
warn_redundant_casts = True

# Запрещает сравнение типов, которые никогда не могут быть равны (например, int == str)
strict_equality = True

# --- Настройки обработки ошибок ---
# Игнорировать missing-imports для сторонних библиотек без стабов (опционально)
# Если вы хотите абсолютной строгости, удалите эту строку или поставьте False
ignore_missing_imports = False

# Показывать сообщения об ошибках в более компактном виде
show_error_codes = True

# --- Настройки для конкретных модулей ---
# Здесь можно ослабить правила для старых библиотек
# [mypy-some_library.*]
# ignore_missing_imports = True
